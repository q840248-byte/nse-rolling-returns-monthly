name: Update NSE Index Data

on:
  schedule:
    # Runs at 1:00 PM UTC = 6:30 PM IST, every weekday (Mon-Fri)
    - cron: '0 13 * * 1-5'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run update script
        run: python update_data.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rolling_returns.html
          git diff --staged --quiet || git commit -m "auto: update index data $(date +'%Y-%m-%d')"
          git push
