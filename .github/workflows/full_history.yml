name: Full History Rebuild (Manual Only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-history:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run full history update
        run: python update_data.py --full

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rolling_returns.html
          git diff --staged --quiet || git commit -m "full-history: rebuild all index data $(date +'%Y-%m-%d')"
          git push
